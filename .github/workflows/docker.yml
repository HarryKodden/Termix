name: Build and Push Docker Image

# Manual: full version + Development | Production. CI path lives in docker-build.yml
# (also invoked from PR Check after lint passes on push).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 1.8.0)"
        required: true
      build_type:
        description: "Build type"
        required: true
        default: "Development"
        type: choice
        options:
          - Development
          - Production

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ github.event.inputs.version }}
      build_type: ${{ github.event.inputs.build_type }}
    secrets: inherit
