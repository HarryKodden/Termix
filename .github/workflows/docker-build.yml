name: Docker build and push

# Reusable: build and push multi-arch image to GHCR (and optional Docker Hub).
# Call with inputs.version + inputs.build_type set for manual mode; omit both for
# CI mode (package.json version, Development + sha tag).

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        default: ""
      build_type:
        type: string
        required: false
        default: ""

jobs:
  build:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine tags
        id: tags
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            BUILD_TYPE="${{ inputs.build_type }}"
          else
            VERSION="$(jq -r .version package.json)"
            BUILD_TYPE="Development"
          fi

          GHCR_BASE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"

          TAGS=()
          ALL_TAGS=()

          if [ "$BUILD_TYPE" = "Production" ]; then
            TAGS+=("release-$VERSION" "latest")
          else
            TAGS+=("dev-$VERSION")
            if [ -z "${{ inputs.version }}" ]; then
              SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-7)"
              TAGS+=("sha-$SHORT_SHA")
            fi
          fi

          for tag in "${TAGS[@]}"; do
            ALL_TAGS+=("${GHCR_BASE}:$tag")
          done

          if [ "$BUILD_TYPE" = "Production" ] && [ -n "${DOCKERHUB_TOKEN:-}" ] && [ -n "${DOCKERHUB_USERNAME:-}" ]; then
            for tag in "${TAGS[@]}"; do
              ALL_TAGS+=("docker.io/${DOCKERHUB_USERNAME}/termix:$tag")
            done
          fi

          echo "ALL_TAGS=$(IFS=,; echo "${ALL_TAGS[*]}")" >> "$GITHUB_ENV"
          echo "GHCR_BASE=${GHCR_BASE}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (prod, optional)
        if: inputs.build_type == 'Production'
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "${DOCKERHUB_TOKEN:-}" ] || [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "Skipping Docker Hub login (set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to push there)."
            exit 0
          fi
          echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.ALL_TAGS }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.run_id }}
          outputs: type=registry,compression=gzip,compression-level=9

      - name: Cleanup Docker
        if: always()
        run: |
          docker image prune -af
          docker system prune -af --volumes
