name: PR Check

on:
  pull_request:
    branches: [main, dev-*]
  push:
    branches: [main, dev-*]

jobs:
  lint-and-build:
    # Forks have no Blacksmith runners — default GitHub-hosted. Set repo/org variable
    # CI_RUNNER (e.g. blacksmith-2vcpu-ubuntu-2404) to use a custom label when available.
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}

    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

      - name: Run Prettier check
        run: npx prettier --check .

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  push-docker-image:
    name: Push Docker image (GHCR)
    needs: lint-and-build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
